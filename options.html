<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>사운드 압축기 설정</title>
  <style>
    body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; margin: 0; padding: 50px 20px; display: flex; justify-content: center; }
    .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 30px; width: 100%; max-width: 600px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); }
    h1 { color: #34d399; margin-top: 0; font-size: 24px; margin-bottom: 8px; }
    p.desc { color: #9ca3af; font-size: 14px; margin-bottom: 30px; }
    label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
    
    /* 툴팁(i) 디자인 */
    .tooltip { position: relative; display: inline-block; cursor: help; color: #10b981; background-color: rgba(16, 185, 129, 0.2); border-radius: 50%; width: 18px; height: 18px; text-align: center; line-height: 18px; font-size: 12px; font-weight: bold; margin-left: 6px; }
    .tooltip .tooltip-text { visibility: hidden; width: 240px; background-color: #1f2937; color: #e5e7eb; text-align: left; border-radius: 6px; padding: 10px; font-size: 12px; font-weight: normal; position: absolute; z-index: 1; bottom: 130%; left: 50%; margin-left: -120px; opacity: 0; transition: opacity 0.2s; border: 1px solid #374151; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.5); }
    .tooltip .tooltip-text::after { content: ""; position: absolute; top: 100%; left: 50%; margin-left: -5px; border-width: 5px; border-style: solid; border-color: #1f2937 transparent transparent transparent; }
    .tooltip:hover .tooltip-text { visibility: visible; opacity: 1; }

    .input-group { display: flex; gap: 10px; margin-bottom: 24px; }
    input[type=text] { flex: 1; background-color: #111827; color: #e5e7eb; border: 1px solid #4b5563; border-radius: 8px; padding: 12px; font-size: 14px; outline: none; }
    input[type=text]:focus { border-color: #10b981; }
    button { background-color: #059669; color: white; border: none; border-radius: 8px; padding: 12px 24px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    button:hover { background-color: #047857; }
    
    .section-container { background-color: rgba(17, 24, 39, 0.5); border: 1px solid rgba(75, 85, 99, 0.5); border-radius: 8px; padding: 16px; margin-bottom: 24px; }
    h3 { font-size: 14px; color: #d1d5db; margin-top: 0; margin-bottom: 12px; }
    ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
    li { display: flex; justify-content: space-between; align-items: center; background-color: #1f2937; padding: 12px; border-radius: 6px; border: 1px solid #374151; font-size: 14px; }
    .delete-btn { background: none; color: #f87171; padding: 4px 8px; font-weight: bold; }
    .delete-btn:hover { background: none; color: #fca5a5; }
    
    .footer { display: flex; justify-content: flex-end; margin-top: 10px; }
    .btn-save { background-color: #2563eb; }
    .btn-save:hover { background-color: #1d4ed8; }
  </style>
</head>
<body>
  <div class="glass">
    <h1>컴프레서 적용 사이트 설정</h1>
    <p class="desc">사운드 압축기가 자동으로 켜질 웹사이트 주소를 관리합니다.</p>

    <div>
      <label>
        적용할 사이트 URL 추가
        <span class="tooltip">i<span class="tooltip-text">오디오 압축이 자동으로 켜질 웹사이트 주소를 입력하세요. (예: youtube.com)</span></span>
      </label>
      <div class="input-group">
        <input type="text" id="newUrlInput" placeholder="예: twitch.tv, netflix.com">
        <button id="addUrlBtn">추가</button>
      </div>
    </div>
    
    <div class="section-container" style="margin-bottom: 0;">
      <h3>현재 등록된 사이트</h3>
      <ul id="urlList"></ul>
    </div>
    
    <div class="footer">
      <button id="saveOptionsBtn" class="btn-save">모든 변경사항 저장</button>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
